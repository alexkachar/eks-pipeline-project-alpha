apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eks-alpha-app
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eks-alpha-app
                port:
                  number: 80