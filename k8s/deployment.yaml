apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-alpha-app
  namespace: default
  labels:
    app: eks-alpha-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eks-alpha-app
  template:
    metadata:
      labels:
        app: eks-alpha-app
    spec:
      serviceAccountName: eks-alpha-app
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: eks-alpha-aws-secrets
      containers:
        - name: app
          image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          ports:
            - containerPort: 3000
          env:
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: eks-alpha-app-secret
                  key: APP_SECRET
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
